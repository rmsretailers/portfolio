<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RMS Portfolio Flipbook</title>

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/src/Style/stPageFlip.min.css"
  /> ge-flip)

  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      font-family: Arial, sans-serif;
    }

    #book-wrap {
      width: min(1100px, 96vw);
      height: min(720px, 86vh);
      margin: 2vh 0;
      position: relative;
    }

    #book {
      width: 100%;
      height: 100%;
    }

    .hint {
      position: fixed;
      bottom: 10px;
      left: 0;
      right: 0;
      color: #bbb;
      font-size: 13px;
      text-align: center;
      pointer-events: none;
    }

    .loading {
      position: fixed;
      top: 12px;
      left: 12px;
      right: 140px;
      color: #ddd;
      font-size: 14px;
      opacity: 0.95;
      pointer-events: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #fullscreenBtn {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 10000;
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      border: 1px solid #666;
      padding: 8px 12px;
      font-size: 14px;
      cursor: pointer;
      border-radius: 4px;
      line-height: 1;
    }

    #fullscreenBtn:hover {
      background: rgba(0, 0, 0, 0.92);
    }

    #fullscreenBtn:active {
      transform: translateY(1px);
    }
