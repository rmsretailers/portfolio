<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RMS Portfolio Flipbook</title>

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/src/Style/stPageFlip.min.css"
  />

  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      font-family: Arial, sans-serif;
    }

    #book-wrap {
      width: min(1100px, 96vw);
      height: min(720px, 86vh);
      margin: 2vh 0;
    }

    #book {
      width: 100%;
      height: 100%;
    }

    .hint {
      position: fixed;
      bottom: 10px;
      left: 0;
      right: 0;
      color: #bbb;
      font-size: 13px;
      text-align: center;
      pointer-events: none;
    }

    .loading {
      position: fixed;
      top: 12px;
      left: 12px;
      right: 12px;
      color: #ddd;
      font-size: 14px;
      opacity: 0.9;
    }
  </style>
</head>

<body>
  <div id="book-wrap">
    <div id="book"></div>
  </div>

  <div class="hint">Tip: swipe or drag pages to flip</div>
  <div id="loading" class="loading">Loading flipbook...</div>

  <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>

  <script type="module">
    import * as pdfjsLib from "https://unpkg.com/pdfjs-dist@5.0.375/build/pdf.min.mjs";

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://unpkg.com/pdfjs-dist@5.0.375/build/pdf.worker.min.mjs";

    const PDF_URL =
      "https://rmsretailers.com/wp-content/uploads/2026/04/RMS-Management-Portfolio-2026-FINAL.pdf";

    const container = document.getElementById("book");
    const loadingEl = document.getElementById("loading");

    function setLoading(text) {
      if (loadingEl) loadingEl.textContent = text;
    }

    async function pdfToImages(pdfUrl, scale = 1.4, maxPages = 120) {
      const loadingTask = pdfjsLib.getDocument(pdfUrl);
      const pdf = await loadingTask.promise;

      const total = Math.min(pdf.numPages, maxPages);
      const images = [];

      for (let pageNum = 1; pageNum <= total; pageNum++) {
        setLoading("Rendering page " + pageNum + " of " + total + "...");

        const page = await pdf.getPage(pageNum);
        const viewport = page.getViewport({ scale });

        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d", { alpha: false });

        canvas.width = Math.floor(viewport.width);
        canvas.height = Math.floor(viewport.height);

        await page.render({ canvasContext: ctx, viewport }).promise;

        images.push(canvas.toDataURL("image/jpeg", 0.92));
      }

      return images;
    }

    (async () => {
      try {
        setLoading("Loading PDF...");

        const images = await pdfToImages(PDF_URL);

        setLoading("Building flipbook...");

        const pageFlip = new St.PageFlip(container, {
          width: 550,
          height: 720,
          size: "stretch",
          showCover: true,
          maxShadowOpacity: 0.25,
          flippingTime: 800
        });

        pageFlip.loadFromImages(images);

        setLoading("");
        if (loadingEl) loadingEl.style.display = "none";
      } catch (err) {
        console.error(err);
        setLoading("Error loading flipbook. Check console for details.");
      }
    })();
  </script>
</body>
</html>
``
